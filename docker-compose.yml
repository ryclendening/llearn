services:
  postgres:
    image: postgres:16
    container_name: llearn-postgres
    environment:
      POSTGRES_DB: llearn
      POSTGRES_USER: llearn
      POSTGRES_PASSWORD: llearn
    ports:
      - "5432:5432"
    volumes:
      - llearn-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llearn -d llearn"]
      interval: 5s
      timeout: 5s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: llearn-weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - llearn-weaviate-data:/var/lib/weaviate

volumes:
  llearn-postgres-data:
  llearn-weaviate-data:
